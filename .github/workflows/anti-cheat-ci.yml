name: Anti-Cheat CI

on:
  pull_request:
    paths:
      - 'backend/anti-cheat/**'
      - '.github/workflows/anti-cheat-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/anti-cheat/**'
      - '.github/workflows/anti-cheat-ci.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/anti-cheat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend/anti-cheat

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zugklang_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zugklang_test
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Generate Prisma client
        run: uv run prisma generate

      - name: Push database schema
        run: uv run prisma db push --skip-generate

      - name: Run tests with coverage
        run: uv run pytest tests/ --cov=src --cov-fail-under=70 --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: anti-cheat-coverage
          path: backend/anti-cheat/coverage.xml

      - name: Dependency audit
        run: uv run pip-audit --requirement <(uv export --no-dev --no-hashes)
        continue-on-error: true

  container-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build anti-cheat image
        run: docker build -t zugklang-anti-cheat:ci ./backend/anti-cheat

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: zugklang-anti-cheat:ci
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
