worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # -----------------------------------------------------------------------
    # Core
    # -----------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens off;  # hide nginx version

    # -----------------------------------------------------------------------
    # Request limits
    # -----------------------------------------------------------------------
    client_max_body_size 2m;
    client_body_timeout  10s;
    client_header_timeout 10s;
    send_timeout         10s;

    proxy_connect_timeout 5s;
    proxy_read_timeout    30s;
    proxy_send_timeout    10s;
    proxy_buffering       on;
    proxy_buffer_size     4k;
    proxy_buffers         8 4k;

    # -----------------------------------------------------------------------
    # Rate limiting
    # -----------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=ws:10m  rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # -----------------------------------------------------------------------
    # WS upgrade map
    # -----------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # -----------------------------------------------------------------------
    # Security headers (applied globally)
    # -----------------------------------------------------------------------
    add_header X-Frame-Options            "DENY"                              always;
    add_header X-Content-Type-Options     "nosniff"                           always;
    add_header X-XSS-Protection           "1; mode=block"                     always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https:; font-src 'self' data:; frame-ancestors 'none';"
        always;

    # -----------------------------------------------------------------------
    # Internal metrics endpoint — NOT published externally (port 8081 is
    # expose-only in compose). Scraped by nginx-prometheus-exporter.
    # -----------------------------------------------------------------------
    server {
        listen 8081;
        server_name _;
        location /stub_status {
            stub_status;
            access_log off;
        }
        location / {
            return 404;
        }
    }

    # -----------------------------------------------------------------------
    # HTTP server (SSL terminated by ngrok upstream)
    # -----------------------------------------------------------------------
    server {
        listen 80;
        http2  on;
        server_name _;

        limit_conn addr 50;

        # -------------------------------------------------------------------
        # WebSocket endpoint (/ws)
        # -------------------------------------------------------------------
        location /ws {
            limit_req zone=ws burst=3 nodelay;

            proxy_pass http://ws-server:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP           $remote_addr;
            proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto   $scheme;

            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
        }

        # -------------------------------------------------------------------
        # Grafana (internal monitoring — restrict by IP in prod if possible)
        # -------------------------------------------------------------------
        location /grafana/ {
            limit_req zone=api burst=5 nodelay;

            # Uncomment and set your admin IP to restrict access:
            # allow 203.0.113.0/24;
            # deny all;

            proxy_pass http://grafana:3001/;
            proxy_http_version 1.1;
            proxy_set_header Host                $host;
            proxy_set_header X-Real-IP           $remote_addr;
            proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto   $scheme;
        }

        # -------------------------------------------------------------------
        # Next.js frontend (catch-all)
        # -------------------------------------------------------------------
        location / {
            # Next.js can fetch many chunks in parallel on first page load.
            # Keep rate limiting, but set realistic values to avoid 503s.
            limit_req zone=api burst=120;

            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP           $remote_addr;
            proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto   $scheme;
        }
    }
}
