services:

  postgres:
    image: postgres:16-alpine
    container_name: zugklang-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydatabase"]
      interval: 10s
      timeout: 5s
      retries: 5

  ws-server:
    build:
      context: ./backend/ws-server
      dockerfile: Dockerfile.prod
      args:
        PORT: 8080
    container_name: zugklang-ws-prod
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - path: ./backend/ws-server/.env.production
        required: false
    environment:
      PORT: 8080

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      target: runner
    container_name: zugklang-frontend-prod
    restart: always
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://admin:mysecretpassword@postgres:5432/mydatabase"
      # NEXT_PUBLIC_WS_URL, AUTH_SECRET, AUTH_GITHUB_ID, AUTH_GITHUB_SECRET: set in .env.production
    env_file:
      - path: ./frontend/.env.production
        required: false
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: zugklang-nginx-prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend

volumes:
  postgres_prod_data:
