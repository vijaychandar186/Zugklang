global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ws-server
    static_configs:
      - targets: ['ws-server:8080']
    metrics_path: /metrics

  - job_name: anti-cheat
    static_configs:
      - targets: ['anti-cheat:8000']
    metrics_path: /metrics

  - job_name: nginx
    static_configs:
      - targets: ['nginx-prometheus-exporter:9113']
    metrics_path: /metrics

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
    metrics_path: /metrics
