services:

  postgres:
    image: postgres:16-alpine
    container_name: zugklang-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydatabase"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zugklang-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: zugklang-pgadmin-dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pga_dev_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zugklang-net

  ws-server:
    build:
      context: ./backend/ws-server
      dockerfile: Dockerfile.dev
      args:
        PORT: 8080
    container_name: zugklang-ws-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      # Token introspection: ws-server calls frontend to verify WS auth tokens.
      # No shared secret needed — tokens are one-time UUIDs issued by the frontend.
      NEXT_APP_URL: http://frontend:3000
      # ALLOWED_ORIGINS: leave unset to allow all origins in dev.
      # Set in ./backend/ws-server/.env.local to restrict (e.g. for Codespaces).
      # ADMIN_KEY: set in .env or override here
    env_file:
      - path: ./backend/ws-server/.env.local
        required: false
    volumes:
      - ./backend/ws-server:/usr/src/app
      - ws_node_modules:/usr/src/app/node_modules
    depends_on:
      - frontend
    networks:
      - zugklang-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: zugklang-frontend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://admin:mysecretpassword@postgres:5432/mydatabase"
      # NEXTAUTH_URL, AUTH_SECRET, AUTH_GITHUB_ID, AUTH_GITHUB_SECRET: set in .env.local
    env_file:
      - path: ./frontend/.env.local
        required: false
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/prisma:/app/prisma
      - /app/node_modules
      - /app/.next
      - /app/src/generated
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zugklang-net

volumes:
  postgres_dev_data:
  ws_node_modules:
  pga_dev_data:

networks:
  zugklang-net:
    driver: bridge
