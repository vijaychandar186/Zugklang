
services:

  postgres:
    image: postgres:16-alpine
    container_name: zugklang-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: mysecretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zugklang-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: zugklang-pgadmin-prod
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pga_prod_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zugklang-net

  ws-server:
    build:
      context: ./backend/ws-server
      dockerfile: Dockerfile.prod
      args:
        PORT: 8080
    container_name: zugklang-ws-prod
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - path: ./backend/ws-server/.env.production
        required: false
    environment:
      PORT: 8080
    networks:
      - zugklang-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      target: runner
    container_name: zugklang-frontend-prod
    restart: always
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://admin:mysecretpassword@postgres:5432/zugklang-frontend"
      # NEXT_PUBLIC_WS_URL, AUTH_URL, AUTH_TRUST_HOST, AUTH_SECRET, AUTH_GITHUB_ID, AUTH_GITHUB_SECRET: set in .env.production
    env_file:
      - path: ./frontend/.env.production
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zugklang-net

  nginx:
    image: nginx:alpine
    container_name: zugklang-nginx-prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    networks:
      - zugklang-net

  anti-cheat:
    build:
      context: ./backend/anti-cheat
      dockerfile: Dockerfile
    container_name: zugklang-anti-cheat-prod
    restart: always
    ports:
      - "8000:8000"
    command: ["./start.sh", "prod"]
    environment:
      DATABASE_URL: "postgresql://admin:mysecretpassword@postgres:5432/zugklang-anti-cheat"
    env_file:
      - path: ./backend/anti-cheat/.env.production
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zugklang-net

volumes:
  postgres_prod_data:
  pga_prod_data:

networks:
  zugklang-net:
    driver: bridge
