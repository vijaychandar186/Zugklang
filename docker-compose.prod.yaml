services:

  redis:
    image: redis:8-alpine
    container_name: zugklang-redis-prod
    restart: always
    # requirepass is loaded from REDIS_PASSWORD env var via the command below
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save ""
      --stop-writes-on-bgsave-error no
      --loglevel warning
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zugklang-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  postgres:
    image: postgres:16-alpine
    container_name: zugklang-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Port intentionally NOT published — only accessible inside zugklang-net.
    # Use a bastion host / VPN for admin access.
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zugklang-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_READ_SEARCH
      - FOWNER
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  ws-server:
    build:
      context: ./backend/ws-server
      dockerfile: Dockerfile.prod
      args:
        PORT: 8080
    container_name: zugklang-ws-prod
    restart: always
    # Port NOT published externally — nginx proxies /ws to this service.
    expose:
      - "8080"
    env_file:
      - path: ./backend/ws-server/.env.production
        required: false
    environment:
      PORT: 8080
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
      NEXT_APP_URL: http://frontend:3000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      # ALLOWED_ORIGINS, ADMIN_KEY, ANTI_CHEAT_URL, GAME_RECORD_URL,
      # INTERNAL_API_SECRET, POD_URL: set in .env.production
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - zugklang-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      target: runner
    container_name: zugklang-frontend-prod
    restart: always
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/zugklang-frontend"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      # AUTH_URL, AUTH_TRUST_HOST, AUTH_SECRET, AUTH_GITHUB_ID, AUTH_GITHUB_SECRET,
      # NEXT_PUBLIC_WS_URL: set in .env.production
    env_file:
      - path: ./frontend/.env.production
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - zugklang-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: zugklang-nginx-prod
    restart: always
    ports:
      - "80:80"
    expose:
      - "8081"   # Internal stub_status for nginx-prometheus-exporter
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - ws-server
    networks:
      - zugklang-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  anti-cheat:
    build:
      context: ./backend/anti-cheat
      dockerfile: Dockerfile
    container_name: zugklang-anti-cheat-prod
    restart: always
    # Port NOT published externally — internal service only.
    expose:
      - "8000"
    command: ["prod"]
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/zugklang-anti-cheat"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      LOGGING_LEVEL: WARNING
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      MPLCONFIGDIR: /tmp/.config/matplotlib
      # INTERNAL_API_SECRET, LOGGING_LEVEL: set in .env.production
    env_file:
      - path: ./backend/anti-cheat/.env.production
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=10)\""]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - zugklang-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: zugklang-redis-exporter-prod
    restart: always
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - "9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - zugklang-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 32M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: zugklang-postgres-exporter-prod
    restart: always
    command:
      - '--config.file=/etc/postgres_exporter.yml'
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"
    volumes:
      - ./monitoring/postgres_exporter.yml:/etc/postgres_exporter.yml:ro
    expose:
      - "9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zugklang-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

  nginx-prometheus-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: zugklang-nginx-exporter-prod
    restart: always
    command: --nginx.scrape-uri=http://nginx:8081/stub_status
    expose:
      - "9113"
    depends_on:
      - nginx
    networks:
      - zugklang-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 32M

  prometheus:
    image: prom/prometheus:latest
    container_name: zugklang-prometheus-prod
    restart: always
    expose:
      - "9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.external-url=http://localhost/prometheus/'
      - '--web.route-prefix=/'
    networks:
      - zugklang-net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    container_name: zugklang-grafana-prod
    restart: always
    expose:
      - "3001"
    environment:
      GF_SERVER_HTTP_PORT: 3001
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: ${GRAFANA_PUBLIC_URL}
      GF_SERVER_SERVE_FROM_SUB_PATH: 'true'
      GF_LOG_LEVEL: warn
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: ${POSTGRES_USER}
      GF_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      # Enable Tempo + Loki datasource linking
      GF_FEATURE_TOGGLES_ENABLE: 'traceqlEditor traceToMetrics'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started
    networks:
      - zugklang-net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — single ingestion point for traces, metrics, logs
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: zugklang-otel-collector-prod
    restart: always
    expose:
      - "4317"   # OTLP gRPC
      - "4318"   # OTLP HTTP
      - "8889"   # Prometheus metrics exporter
    volumes:
      - ./monitoring/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - zugklang-net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Grafana Tempo — distributed trace storage + query backend
  # ---------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.5.0
    container_name: zugklang-tempo-prod
    restart: always
    expose:
      - "3200"   # Tempo HTTP API (Grafana datasource)
      - "4317"   # OTLP gRPC ingest (from collector)
      - "4318"   # OTLP HTTP ingest (from collector)
    volumes:
      - ./monitoring/tempo.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    command: ["-config.file=/etc/tempo.yaml"]
    networks:
      - zugklang-net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ---------------------------------------------------------------------------
  # Grafana Loki — log aggregation backend
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:latest
    container_name: zugklang-loki-prod
    restart: always
    expose:
      - "3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    networks:
      - zugklang-net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Promtail — scrapes container logs and forwards to Loki
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:latest
    container_name: zugklang-promtail-prod
    restart: always
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - zugklang-net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

volumes:
  postgres_prod_data:
  redis_prod_data:
  prometheus_data:
  tempo_data:
  loki_data:
  grafana_data:

networks:
  zugklang-net:
    driver: bridge
