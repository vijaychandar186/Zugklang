# Self-hosted Sentry stack — run independently from the main app stack.
#
# SETUP (first-time only):
#   1. Copy and fill secrets:
#        cp sentry/.env.sentry.example sentry/.env.sentry
#   2. Generate Sentry config files (requires Docker):
#        docker compose -f docker-compose.sentry.yaml run --rm sentry-web config generate-secret-key
#        docker compose -f docker-compose.sentry.yaml run --rm sentry-web upgrade --noinput
#        docker compose -f docker-compose.sentry.yaml run --rm sentry-web createuser \
#          --email admin@example.com --password <pass> --superuser
#   3. Bootstrap Snuba schemas:
#        docker compose -f docker-compose.sentry.yaml run --rm snuba-api migrations migrate --force
#   4. Start everything:
#        docker compose -f docker-compose.sentry.yaml up -d
#
# ACCESS: http://<host>:9000  (or proxy behind nginx/Caddy on your preferred domain)
#
# UPDATE (rolling upgrade):
#   docker compose -f docker-compose.sentry.yaml pull
#   docker compose -f docker-compose.sentry.yaml run --rm sentry-web upgrade --noinput
#   docker compose -f docker-compose.sentry.yaml up -d

x-sentry-base: &sentry-base
  image: getsentry/sentry:${SENTRY_VERSION:-nightly}
  restart: unless-stopped
  env_file:
    - ./sentry/.env.sentry
  environment:
    SENTRY_CONF: /etc/sentry
  volumes:
    - ./sentry/sentry.conf.py:/etc/sentry/sentry.conf.py:ro
    - ./sentry/config.yml:/etc/sentry/config.yml:ro
    - sentry_data:/data
  depends_on:
    sentry-postgres:
      condition: service_healthy
    sentry-redis:
      condition: service_healthy
    sentry-kafka:
      condition: service_healthy
    sentry-clickhouse:
      condition: service_healthy
    sentry-memcached:
      condition: service_started
  networks:
    - sentry-net

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  sentry-postgres:
    image: postgres:14-alpine
    container_name: sentry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sentry
      POSTGRES_PASSWORD: ${SENTRY_POSTGRES_PASSWORD}
      POSTGRES_DB: sentry
    volumes:
      - sentry_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentry"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentry-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_READ_SEARCH

  sentry-redis:
    image: redis:7-alpine
    container_name: sentry-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - sentry_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentry-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  sentry-memcached:
    image: memcached:1.6-alpine
    container_name: sentry-memcached
    restart: unless-stopped
    networks:
      - sentry-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  sentry-zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: sentry-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
      ZOOKEEPER_TOOLS_LOG4J_LOGLEVEL: WARN
    volumes:
      - sentry_zookeeper_data:/var/lib/zookeeper/data
      - sentry_zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: echo ruok | nc localhost 2181 | grep imok
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentry-net
    security_opt:
      - no-new-privileges:true

  sentry-kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: sentry-kafka
    restart: unless-stopped
    environment:
      KAFKA_ZOOKEEPER_CONNECT: sentry-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://sentry-kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG4J_LOGGERS: "kafka.controller=WARN,kafka.producer.async.DefaultEventHandler=WARN,state.change.logger=WARN"
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      KAFKA_TOOLS_LOG4J_LOGLEVEL: WARN
      CONFLUENT_SUPPORT_METRICS_ENABLE: 'false'
    volumes:
      - sentry_kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    depends_on:
      sentry-zookeeper:
        condition: service_healthy
    networks:
      - sentry-net
    security_opt:
      - no-new-privileges:true

  sentry-clickhouse:
    image: altinity/clickhouse-server:23.8.11.29.altinitystable
    container_name: sentry-clickhouse
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - sentry_clickhouse_data:/var/lib/clickhouse
      - ./sentry/clickhouse/config.xml:/etc/clickhouse-server/config.d/sentry.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentry-net
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # Snuba — ClickHouse query layer for Sentry
  # ---------------------------------------------------------------------------
  snuba-api:
    image: getsentry/snuba:${SNUBA_VERSION:-nightly}
    container_name: sentry-snuba-api
    restart: unless-stopped
    environment:
      SNUBA_SETTINGS: docker
      CLICKHOUSE_HOST: sentry-clickhouse
      DEFAULT_BROKERS: sentry-kafka:9092
      REDIS_HOST: sentry-redis
      UWSGI_MAX_REQUESTS: 10000
      UWSGI_DISABLE_LOGGING: 'true'
    depends_on:
      sentry-clickhouse:
        condition: service_healthy
      sentry-kafka:
        condition: service_healthy
      sentry-redis:
        condition: service_healthy
    expose:
      - "1218"
    networks:
      - sentry-net
    security_opt:
      - no-new-privileges:true

  snuba-consumer:
    image: getsentry/snuba:${SNUBA_VERSION:-nightly}
    container_name: sentry-snuba-consumer
    restart: unless-stopped
    command: rust-consumer --storage errors --consumer-group snuba-consumers --auto-offset-reset=latest --no-strict-offset-reset
    environment:
      SNUBA_SETTINGS: docker
      CLICKHOUSE_HOST: sentry-clickhouse
      DEFAULT_BROKERS: sentry-kafka:9092
      REDIS_HOST: sentry-redis
    depends_on:
      snuba-api:
        condition: service_started
    networks:
      - sentry-net
    security_opt:
      - no-new-privileges:true

  snuba-outcomes-consumer:
    image: getsentry/snuba:${SNUBA_VERSION:-nightly}
    container_name: sentry-snuba-outcomes-consumer
    restart: unless-stopped
    command: rust-consumer --storage outcomes_raw --consumer-group snuba-consumers --auto-offset-reset=earliest --no-strict-offset-reset
    environment:
      SNUBA_SETTINGS: docker
      CLICKHOUSE_HOST: sentry-clickhouse
      DEFAULT_BROKERS: sentry-kafka:9092
      REDIS_HOST: sentry-redis
    depends_on:
      snuba-api:
        condition: service_started
    networks:
      - sentry-net
    security_opt:
      - no-new-privileges:true

  snuba-sessions-consumer:
    image: getsentry/snuba:${SNUBA_VERSION:-nightly}
    container_name: sentry-snuba-sessions-consumer
    restart: unless-stopped
    command: rust-consumer --storage sessions --consumer-group snuba-consumers --auto-offset-reset=latest --no-strict-offset-reset
    environment:
      SNUBA_SETTINGS: docker
      CLICKHOUSE_HOST: sentry-clickhouse
      DEFAULT_BROKERS: sentry-kafka:9092
      REDIS_HOST: sentry-redis
    depends_on:
      snuba-api:
        condition: service_started
    networks:
      - sentry-net
    security_opt:
      - no-new-privileges:true

  snuba-transactions-consumer:
    image: getsentry/snuba:${SNUBA_VERSION:-nightly}
    container_name: sentry-snuba-transactions-consumer
    restart: unless-stopped
    command: rust-consumer --storage transactions --consumer-group snuba-consumers --auto-offset-reset=latest --no-strict-offset-reset
    environment:
      SNUBA_SETTINGS: docker
      CLICKHOUSE_HOST: sentry-clickhouse
      DEFAULT_BROKERS: sentry-kafka:9092
      REDIS_HOST: sentry-redis
    depends_on:
      snuba-api:
        condition: service_started
    networks:
      - sentry-net
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # Relay — ingest endpoint that receives events from SDKs
  # ---------------------------------------------------------------------------
  relay:
    image: getsentry/relay:${RELAY_VERSION:-nightly}
    container_name: sentry-relay
    restart: unless-stopped
    command: run --config /work/.relay
    volumes:
      - ./sentry/relay:/work/.relay:ro
    depends_on:
      - sentry-web
      - sentry-kafka
    expose:
      - "3000"
    networks:
      - sentry-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ---------------------------------------------------------------------------
  # Sentry application services
  # ---------------------------------------------------------------------------
  sentry-web:
    <<: *sentry-base
    container_name: sentry-web
    command: run web
    expose:
      - "9000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9000/_health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  sentry-worker:
    <<: *sentry-base
    container_name: sentry-worker
    command: run worker -c 2
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

  sentry-cron:
    <<: *sentry-base
    container_name: sentry-cron
    command: run cron

  sentry-ingest-consumer:
    <<: *sentry-base
    container_name: sentry-ingest-consumer
    command: run ingest-consumer --all-consumer-types

  sentry-post-process-forwarder-errors:
    <<: *sentry-base
    container_name: sentry-post-process-forwarder-errors
    command: run post-process-forwarder --entity-type errors --commit-batch-size 1

  sentry-post-process-forwarder-transactions:
    <<: *sentry-base
    container_name: sentry-post-process-forwarder-transactions
    command: run post-process-forwarder --entity-type transactions --commit-batch-size 1

  sentry-subscription-consumer-events:
    <<: *sentry-base
    container_name: sentry-subscription-consumer-events
    command: run query-subscription-consumer --commit-batch-size 1 --topic events-subscription-results

  sentry-subscription-consumer-transactions:
    <<: *sentry-base
    container_name: sentry-subscription-consumer-transactions
    command: run query-subscription-consumer --commit-batch-size 1 --topic transactions-subscription-results

  # ---------------------------------------------------------------------------
  # nginx — expose Sentry web on port 9000
  # ---------------------------------------------------------------------------
  sentry-nginx:
    image: nginx:alpine
    container_name: sentry-nginx
    restart: unless-stopped
    ports:
      - "9000:80"
    volumes:
      - ./sentry/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      sentry-web:
        condition: service_healthy
    networks:
      - sentry-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  sentry_postgres_data:
  sentry_redis_data:
  sentry_zookeeper_data:
  sentry_zookeeper_log:
  sentry_kafka_data:
  sentry_clickhouse_data:
  sentry_data:

networks:
  sentry-net:
    driver: bridge
