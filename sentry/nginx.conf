worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server_tokens off;
    keepalive_timeout 65;

    # Sentry can return large responses (stack traces, source maps)
    client_max_body_size 100m;

    server {
        listen 80;
        server_name _;

        # Route ingest endpoints through Relay.
        location ~ ^/api/[1-9]\d*/(store|envelope|minidump|security)/ {
            proxy_pass http://sentry-relay:3000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_read_timeout 120s;
            proxy_connect_timeout 5s;
        }

        location / {
            proxy_pass http://sentry-web:9000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_read_timeout 120s;
            proxy_connect_timeout 5s;
        }
    }
}
