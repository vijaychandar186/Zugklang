name: Anti-Cheat CI

on:
  pull_request:
    paths:
      - 'backend/anti-cheat/**'
      - '.github/workflows/anti-cheat-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/anti-cheat/**'
      - '.github/workflows/anti-cheat-ci.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/anti-cheat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend/anti-cheat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests with coverage
        run: uv run pytest tests/ --cov=src --cov-fail-under=70 --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: anti-cheat-coverage
          path: backend/anti-cheat/coverage.xml

      - name: Dependency audit
        run: uv run pip-audit --requirement <(uv export --no-dev --no-hashes)
        continue-on-error: true

  container-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build anti-cheat image
        run: docker build -t zugklang-anti-cheat:ci ./backend/anti-cheat

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: zugklang-anti-cheat:ci
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
