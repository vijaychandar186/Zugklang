services:

  redis:
    image: redis:8-alpine
    container_name: zugklang-redis-dev
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zugklang-net

  postgres:
    image: postgres:16-alpine
    container_name: zugklang-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: mysecretpassword
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zugklang-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: zugklang-pgadmin-dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
      PGADMIN_CONFIG_WTF_CSRF_CHECK_DEFAULT: "False"
      SCRIPT_NAME: /pgadmin
    volumes:
      - pga_dev_data:/var/lib/pgadmin
    expose:
      - "80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zugklang-net

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: zugklang-redis-commander-dev
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
      URL_PREFIX: /redis
    expose:
      - "8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - zugklang-net

  ws-server:
    build:
      context: ./backend/ws-server
      dockerfile: Dockerfile.dev
      args:
        PORT: 8080
    container_name: zugklang-ws-dev
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      # Token introspection: ws-server calls frontend to verify WS auth tokens.
      # No shared secret needed — tokens are one-time UUIDs issued by the frontend.
      NEXT_APP_URL: http://frontend:3000
      REDIS_URL: redis://redis:6379
      # Optional in dev. Leave empty unless the internal route exists.
      GAME_RECORD_URL: ""
      # Force permissive dev origins (including ngrok); avoids stale .env.local restrictions.
      ALLOWED_ORIGINS: ""
      # ALLOWED_ORIGINS: leave unset to allow all origins in dev.
      # Set in ./backend/ws-server/.env.local to restrict (e.g. for Codespaces).
      # ADMIN_KEY: set in .env or override here
    env_file:
      - path: ./backend/ws-server/.env.local
        required: false
    volumes:
      - ./backend/ws-server:/usr/src/app
      - ws_node_modules:/usr/src/app/node_modules
    depends_on:
      - frontend
      - redis
    networks:
      - zugklang-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: zugklang-frontend-dev
    restart: unless-stopped
    stdin_open: true
    tty: true
    expose:
      - "3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://admin:mysecretpassword@postgres:5432/zugklang-frontend"
      REDIS_URL: redis://redis:6379
      # AUTH_URL, AUTH_SECRET, AUTH_GITHUB_ID, AUTH_GITHUB_SECRET: set in .env.local
    command: ["sh", "-c", "pnpm prisma migrate dev && pnpm exec next dev"]
    env_file:
      - path: ./frontend/.env.local
        required: false
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/prisma:/app/prisma
      - /app/node_modules
      - /app/.next
      - /app/src/generated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zugklang-net

  nginx:
    image: nginx:alpine
    container_name: zugklang-nginx-dev
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - ws-server
      - pgadmin
      - anti-cheat
      - redis-commander
    networks:
      - zugklang-net

  prisma-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: zugklang-prisma-frontend-dev
    restart: unless-stopped
    ports:
      - "5555:5555"
    command: ["sh", "-c", "npx prisma studio --port 5555 --browser none"]
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://admin:mysecretpassword@postgres:5432/zugklang-frontend"
    env_file:
      - path: ./frontend/.env.local
        required: false
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/prisma:/app/prisma
      - /app/node_modules
      - /app/.next
      - /app/src/generated
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zugklang-net

  prisma-anti-cheat:
    build:
      context: ./backend/anti-cheat
      dockerfile: Dockerfile
    container_name: zugklang-prisma-anti-cheat-dev
    restart: unless-stopped
    ports:
      - "5556:5556"
    entrypoint: ["sh", "-c", "prisma studio --port 5556 --browser none"]
    environment:
      DATABASE_URL: "postgresql://admin:mysecretpassword@postgres:5432/zugklang-anti-cheat"
    env_file:
      - path: ./backend/anti-cheat/.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zugklang-net

  anti-cheat:
    build:
      context: ./backend/anti-cheat
      dockerfile: Dockerfile
    container_name: zugklang-anti-cheat-dev
    restart: unless-stopped
    expose:
      - "8000"
    command: ["dev"]
    environment:
      DATABASE_URL: "postgresql://admin:mysecretpassword@postgres:5432/zugklang-anti-cheat"
      REDIS_URL: redis://redis:6379
    env_file:
      - path: ./backend/anti-cheat/.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zugklang-net

volumes:
  postgres_dev_data:
  redis_dev_data:
  ws_node_modules:
  pga_dev_data:

networks:
  zugklang-net:
    driver: bridge
